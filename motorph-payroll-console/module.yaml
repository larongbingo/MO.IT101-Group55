product:
  type: jvm/app
  platforms: [ jvm ]

dependencies:
  - ../motorph-payroll-core
  - de.siegmar:fastcsv:4.1.1

test-dependencies:
  - ../motorph-payroll-core
  - bom: org.junit:junit-bom:5.10.0
  - org.junit.jupiter:junit-jupiter
  - org.junit.platform:junit-platform-launcher:
      scope: runtime-only
  - org.mockito:mockito-core:5.23.0
  - org.mockito:mockito-junit-jupiter:5.23.0

settings:
  junit: junit-5
  jvm:
    jdk:
      version: 25
      selectionMode: alwaysProvision